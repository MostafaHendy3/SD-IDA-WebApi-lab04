<!DOCTYPE html>
<html lang="en">

<head>
    <title>Add Department</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="script.js"></script>
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h1 class="card-title text-center mb-4">Add Department</h1>
                        <form id="addDepartmentForm" onsubmit="event.preventDefault(); addDepartment();">
                            <div class="mb-3">
                                <label for="deptName" class="form-label">Department Name:</label>
                                <input type="text" class="form-control" id="deptName" name="deptName" required>
                            </div>

                            <div class="mb-3">
                                <label for="deptLocation" class="form-label">Department Location:</label>
                                <input type="text" class="form-control" id="deptLocation" name="deptLocation" required>
                            </div>

                            <div class="mb-3">
                                <label for="deptPhone" class="form-label">Department Phone Number:</label>
                                <input type="text" class="form-control" id="deptPhone" name="deptPhone" required>
                            </div>

                            <div class="mb-3">
                                <label for="deptManager" class="form-label">Department Manager:</label>
                                <input type="text" class="form-control" id="deptManager" name="deptManager" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Add Department</button>
                        </form>
                        <div id="responseMessage"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
