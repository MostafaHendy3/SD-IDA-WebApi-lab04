<!DOCTYPE html>
<html lang="en">

<head>
    <title>Add Department</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script defer src="script.js"></script>
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h1 class="card-title text-center mb-4">Departments List</h1>
                        <div class="d-flex justify-content-center mb-4">
                            <button class="btn btn-primary" onclick="getAll()">Get Departments</button>
                        </div>
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th scope="col">Department Name</th>
                                    <th scope="col">Students Names</th>
                                    <th scope="col">Count of Students</th>
                                    <th scope="col">Message</th>
                                </tr>
                            </thead>
                            <tbody id="departmentsTableBody">
                                <!-- Departments will be displayed here -->
                            </tbody>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
